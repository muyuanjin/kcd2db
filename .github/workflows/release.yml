name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - '*.*.*'
      - 'v*.*.*'
      - '*.*.*-*'
      - 'v*.*.*-*'

permissions:
  contents: write

jobs:
  build-mod:
    name: Build Mods
    runs-on: windows-2022

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      # 同时禁用 cppcheck 和 cpplint
      - name: Configure CMake
        run: |
          cmake -B build -G "Visual Studio 17 2022" -DSQLITECPP_RUN_CPPCHECK=OFF -DSQLITECPP_RUN_CPPLINT=OFF -DKCD2DB_VERSION="${{ github.ref_name }}"

      - name: Build
        run: |
          cmake --build build --config Release

      - name: Get timestamp
        id: date
        run: echo "formattedDate=$(Get-Date -Format 'yyyy-MM-dd_HHmm')" >> $env:GITHUB_OUTPUT

      # 动态获取最新的 x64 加载器
      - name: Get Latest ASI Loader
        run: |
          $response = Invoke-RestMethod -Uri "https://api.github.com/repos/ThirteenAG/Ultimate-ASI-Loader/releases/latest"
          $x64Asset = $response.assets | Where-Object { $_.name -like "*_x64.zip" }
          Invoke-WebRequest -Uri $x64Asset.browser_download_url -OutFile loader_x64.zip
          Expand-Archive -Path loader_x64.zip -DestinationPath asi-loader

      # 打包文件
      - name: Package into ZIP
        run: |
          New-Item -ItemType Directory -Path release-package-db
          Copy-Item build\Release\kcd2db.asi release-package-db
          Copy-Item asi-loader\*.dll release-package-db
          Compress-Archive -Path release-package-db\* -DestinationPath kcd2db-${{ github.REF_NAME }}.zip

          New-Item -ItemType Directory -Path release-package-cursor
          Copy-Item build\Release\kcd2cursor.asi release-package-cursor
          Copy-Item asi-loader\*.dll release-package-cursor
          Compress-Archive -Path release-package-cursor\* -DestinationPath kcd2cursor-${{ github.REF_NAME }}.zip

      - name: Package fake DB fallback mod
        run: |
          python tools\package_fake_db_mod.py --version "${{ github.ref_name }}" --output "kcd2db_fake_db-${{ github.ref_name }}.zip"

      - name: Resolve release metadata
        id: release_meta
        shell: pwsh
        run: |
          $isPrerelease = "${{ github.ref_name }}".Contains("-")
          "prerelease=$($isPrerelease.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT
          "make_latest=$(if ($isPrerelease) { 'false' } else { 'true' })" >> $env:GITHUB_OUTPUT

      - name: Generate release notes
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true

          try {
            $generatedNotes = (gh api "repos/$env:GITHUB_REPOSITORY/releases/generate-notes" `
              --method POST `
              -f tag_name="$env:RELEASE_TAG" `
              -f target_commitish="$env:GITHUB_SHA" `
              --jq ".body") -join "`n"
          } catch {
            $commits = git log -n 20 --pretty="- %h %s" | Out-String
            $generatedNotes = "## Changes`n`n$commits"
          }

          $body = @"
          $generatedNotes

          ## Installation

          Extract **ALL** files from the selected ASI ZIP to your game directory:
          ``KingdomComeDeliverance2/Bin/Win64MasterMasterSteamPGO/``

          Assets:
          - ``kcd2db-$env:RELEASE_TAG.zip``: Lua persistence module.
          - ``kcd2cursor-$env:RELEASE_TAG.zip``: standalone cursor hook module.
          - ``kcd2db_fake_db-$env:RELEASE_TAG.zip``: diagnostic fake DB fallback mod.

          Each ASI ZIP contains:
          - The selected ASI file
          - Latest Ultimate-ASI-Loader (x64)

          ## Mod Authors
          Download ``kcd2db_fake_db.lua`` from the release assets if you want to bundle
          the optional Lua fake DB layer in your own mod.

          ## Troubleshooting
          ``kcd2db_fake_db-$env:RELEASE_TAG.zip`` is a diagnostic fallback mod. It
          provides a session-only fake DB backend for testing kcd2db-dependent Lua mods
          without the ASI plugin. It does not save data to disk.

          ## Debugging
          - Launch with ``-console`` for debug window
          "@

          $body = ($body -split "`r?`n" | ForEach-Object { $_ -replace "^\s{10}", "" }) -join "`n"
          Set-Content -Path release-notes.md -Value $body -Encoding utf8

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            kcd2db-${{ github.REF_NAME }}.zip
            kcd2cursor-${{ github.REF_NAME }}.zip
            dist/kcd2db_fake_db.lua
            kcd2db_fake_db-${{ github.ref_name }}.zip
          prerelease: ${{ steps.release_meta.outputs.prerelease }}
          make_latest: ${{ steps.release_meta.outputs.make_latest }}
          body_path: release-notes.md
